{% extends "base.html" %}

{% block title %}Password Updated — {{ APP_NAME }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-sm-8 col-md-5 col-lg-4">
        <div class="card shadow-sm mt-5">
            <div class="card-body p-4 text-center">
                <h4 class="mb-3" style="font-family:'Barlow Condensed',sans-serif;font-weight:700;">Password Updated</h4>
                <p class="text-muted small mb-4">Your password has been changed successfully.</p>
                <a href="{% url 'users:account_settings' %}" class="btn btn-sm w-100" style="background:var(--green-dark);color:#fff;">Back to Account Settings</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
