{% extends "base.html" %}

{% block title %}Forgot Password — {{ APP_NAME }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-sm-8 col-md-5 col-lg-4">
        <div class="card shadow-sm mt-5">
            <div class="card-body p-4">
                <h4 class="mb-1" style="font-family:'Barlow Condensed',sans-serif;font-weight:700;">Forgot Password</h4>
                <p class="text-muted small mb-4">Enter your email and we'll send you a reset link.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label small fw-semibold">Email</label>
                        <input type="email" name="email" class="form-control form-control-sm" autofocus required>
                    </div>
                    <button type="submit" class="btn btn-sm w-100" style="background:var(--green-dark);color:#fff;">Send Reset Link</button>
                </form>
                <p class="text-center text-muted small mt-3 mb-0">
                    <a href="{% url 'login' %}">← Back to Sign In</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
