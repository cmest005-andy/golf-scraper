{% extends "base.html" %}
{% block title %}Server Error — {{ APP_NAME }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-sm-8 col-md-5 col-lg-4 text-center mt-5">
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:5rem;font-weight:700;color:var(--green-dark);line-height:1;">500</div>
        <h4 class="mb-2" style="font-family:'Barlow Condensed',sans-serif;font-weight:700;">Something Went Wrong</h4>
        <p class="text-muted small mb-4">An unexpected error occurred. Try again or head back home.</p>
        <a href="/" class="btn btn-sm" style="background:var(--green-dark);color:#fff;">Go Home</a>
    </div>
</div>
{% endblock %}
