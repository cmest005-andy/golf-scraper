{% extends "base.html" %}
{% load static %}
{% block title %}{{ APP_NAME }}{% endblock %}

{% block content %}
<div class="d-flex flex-column align-items-center justify-content-center text-center" style="padding:4rem 1rem;">
    <img src="{% static 'img/logo.png' %}" alt="{{ APP_NAME }}" style="width:220px;height:auto;margin-bottom:2rem;">
    <h1 style="font-family:'Barlow Condensed',sans-serif;font-size:3rem;font-weight:700;letter-spacing:.04em;color:var(--green-dark);margin-bottom:.25rem;">
        Player's Ball
    </h1>
    <p style="font-family:'Barlow Condensed',sans-serif;font-size:1.3rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:2.5rem;">
        Fantasy Golf League
    </p>
    <div class="d-flex flex-wrap gap-3 justify-content-center">
        {% if user.is_authenticated %}
        <a href="{% url 'fantasy:my_leagues' %}" class="btn btn-lg px-4" style="background:var(--green-dark);color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;letter-spacing:.05em;">My Leagues</a>
        <a href="{% url 'golf:index' %}" class="btn btn-lg btn-outline-secondary px-4" style="font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;letter-spacing:.05em;">Leaderboard</a>
        {% else %}
        <a href="{% url 'login' %}" class="btn btn-lg px-4" style="background:var(--green-dark);color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;letter-spacing:.05em;">Sign In</a>
        <a href="{% url 'users:register' %}" class="btn btn-lg btn-outline-secondary px-4" style="font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;letter-spacing:.05em;">Create Account</a>
        {% endif %}
    </div>
</div>
{% endblock %}
