{% extends "base.html" %}

{% block title %}Check Your Email — {{ APP_NAME }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-sm-8 col-md-5 col-lg-4">
        <div class="card shadow-sm mt-5">
            <div class="card-body p-4 text-center">
                <h4 class="mb-3" style="font-family:'Barlow Condensed',sans-serif;font-weight:700;">Check Your Email</h4>
                <p class="text-muted small mb-4">If an account exists for that email address, we've sent a password reset link. Check your inbox (and spam folder).</p>
                <a href="{% url 'login' %}" class="btn btn-sm w-100" style="background:var(--green-dark);color:#fff;">Back to Sign In</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
