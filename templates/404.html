{% extends "base.html" %}
{% block title %}Page Not Found — {{ APP_NAME }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-sm-8 col-md-5 col-lg-4 text-center mt-5">
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:5rem;font-weight:700;color:var(--green-dark);line-height:1;">404</div>
        <h4 class="mb-2" style="font-family:'Barlow Condensed',sans-serif;font-weight:700;">Page Not Found</h4>
        <p class="text-muted small mb-4">That URL doesn't exist. You may have followed a bad link or mistyped the address.</p>
        <a href="/" class="btn btn-sm" style="background:var(--green-dark);color:#fff;">Go Home</a>
    </div>
</div>
{% endblock %}
